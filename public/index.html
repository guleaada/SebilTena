<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <title>Sebil Tena</title>
  <meta name="description" content="Sebil Tena — check a pesticide is genuine and registered, get the correct dose, safety gear and first aid, in your language." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Top bar: brand + language -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🌿</span>
      <span id="appName">Sebil Tena</span>
    </div>
    <button id="langBtn" class="lang-btn" aria-haspopup="dialog">
      <span aria-hidden="true">🌐</span><span id="langLabel">አማርኛ</span>
    </button>
  </header>

  <main id="app">
    <!-- HOME — the front door, never a gate (M9). Above the fold: brand, one
         hero action, emergency (global pin), language (topbar). Below: the
         story, for people who scroll. A farmer never needs the story zone. -->
    <section id="view-home" class="view is-active">
      <div class="home-hero">
        <div class="home-brand" aria-hidden="true">🌿</div>
        <h1 class="home-name" id="homeName">Sebil Tena</h1>
        <p class="home-tag" id="homeTag"></p>
        <button id="heroScanBtn" class="hero-scan">
          <span class="hero-scan-icon" aria-hidden="true">📷</span>
          <span id="heroScanLabel"></span>
        </button>
        <button id="skipIntro" class="home-skip"></button>
        <div class="home-scroll-cue" aria-hidden="true">⌄</div>
      </div>
      <div id="homeStory" class="home-story"></div>
    </section>

    <!-- SCAN (the previous opening screen; reached from the hero) -->
    <section id="view-scan" class="view">
      <button class="ghost-btn scan-home-link" data-nav="home">← <span id="aboutLabel"></span></button>
      <p class="tagline" id="tagline"></p>
      <button id="scanBtn" class="scan-orb">
        <span class="orb-ring"></span>
        <span class="orb-icon" aria-hidden="true">📷</span>
        <span class="orb-label" id="scanLabel"></span>
      </button>
    </section>

    <!-- CAMERA -->
    <section id="view-camera" class="view">
      <div class="camera-wrap">
        <video id="cam" autoplay playsinline muted></video>
        <div class="reticle" aria-hidden="true">
          <span class="reticle-hint" id="frameHint"></span>
        </div>
        <div class="light-hint" id="lightHint" hidden></div>
      </div>
      <div class="camera-bar">
        <button id="camBack" class="ghost-btn" data-nav="scan">✕</button>
        <button id="captureBtn" class="capture-btn" aria-label="capture"></button>
        <label class="file-fallback" id="fileFallback">
          <input id="fileInput" type="file" accept="image/*" capture="environment" hidden />
          <span aria-hidden="true">🖼️</span>
        </label>
      </div>
      <p class="hint" id="uploadLabel"></p>
    </section>

    <!-- QUALITY SUGGESTION — post-capture, before OCR (M11 Part B). Never blocks:
         always offers "Use anyway". Built dynamically. -->
    <section id="view-quality" class="view">
      <div id="qualityRoot"></div>
    </section>

    <!-- LOADING -->
    <section id="view-loading" class="view">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-text" id="loadingText"></p>
    </section>

    <!-- RESULT (verdict + optional safety/dosage) -->
    <section id="view-result" class="view">
      <div id="verdictCard"></div>
      <div id="resultBody"></div>
    </section>

    <!-- EMERGENCY — one-tap poison-control flow (built dynamically) -->
    <section id="view-emergency" class="view">
      <div id="emergencyRoot"></div>
    </section>
  </main>

  <!-- Pinned EMERGENCY button (present on every screen) -->
  <button id="sosBtn" class="sos" aria-label="Emergency">
    <span class="sos-cross" aria-hidden="true">✚</span>
    <span class="sos-label" id="sosLabel"></span>
  </button>

  <!-- Language chooser sheet -->
  <div id="langSheet" class="sheet" hidden>
    <div class="sheet-card">
      <h2 id="langTitle"></h2>
      <div id="langList" class="lang-list"></div>
    </div>
  </div>

  <!-- Location consent sheet -->
  <div id="geoSheet" class="sheet" hidden>
    <div class="sheet-card">
      <div class="geo-icon" aria-hidden="true">📍</div>
      <p id="geoText"></p>
      <div class="sheet-actions">
        <button id="geoAllow" class="btn btn-primary"></button>
        <button id="geoSkip" class="ghost-btn"></button>
      </div>
    </div>
  </div>

  <canvas id="snap" hidden></canvas>
  <script src="/js/net.js"></script>
  <script src="/js/quality.js"></script>
  <script src="/js/verdict.js"></script>
  <script src="/js/registry.js"></script>
  <script src="/js/queue.js"></script>
  <script src="/vendor/tesseract/tesseract.min.js"></script>
  <script src="/js/ocr.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/app.js"></script>
</body>
</html>
